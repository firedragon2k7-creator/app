<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyLens — Dự báo thời tiết</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <noscript>
    <div class="noscript-banner">
      ⚠️ <strong>JavaScript đang bị tắt!</strong> SkyLens cần JavaScript để lấy dữ liệu thời tiết và hiển thị bản đồ. Vui lòng bật JavaScript trong cài đặt trình duyệt để tiếp tục.
    </div>
  </noscript>

  <div class="noise"></div>
  <header class="site-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 14 Q14 6 21 14 Q14 22 7 14Z" fill="currentColor" opacity="0.15"/>
        <circle cx="14" cy="14" r="4" fill="currentColor"/>
      </svg>
      SkyLens
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="search">Tìm kiếm</button>
      <button class="tab" data-tab="compare">So sánh</button>
      <button class="tab" data-tab="chart">Biểu đồ</button>
    </nav>
    <button class="settings-btn" id="settingsBtn" title="Cài đặt API Key">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <main>
    <section class="tab-panel active" id="tab-search">
      <div class="hero-search">
        <h1 class="hero-title">Thời tiết<br/><em>hôm nay</em></h1>
        <div class="search-wrap">
          <input type="text" id="cityInput" placeholder="Nhập thành phố..." autocomplete="off" />
          <button class="btn-search" id="searchBtn" type="button" title="Tìm kiếm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>

          <button class="btn-locate" id="locateBtn" title="Dùng vị trí hiện tại">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="8" stroke-dasharray="2 2"/></svg>
          </button>
        </div>
        <div class="quick-cities-container" id="container-search">
           <div class="quick-cities" data-type="search"></div>
        </div>
      </div>

      <div id="errorMsg" class="error-banner" style="display:none"></div>

      <div id="weatherCard" class="weather-card" style="display:none">
        <div class="card-top">
          <div class="card-left">
            <div class="city-label" id="cityLabel"></div>
            <div class="date-label" id="dateLabel"></div>
            <div class="temp-big" id="tempBig"></div>
            <div class="desc-label" id="descLabel"></div>
          </div>
          <div class="card-right">
            <div class="weather-emoji" id="weatherEmoji"></div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat"><span class="stat-icon">💧</span><span class="stat-val" id="statHumidity">—</span><span class="stat-name">Độ ẩm</span></div>
          <div class="stat"><span class="stat-icon">🌬️</span><span class="stat-val" id="statWind">—</span><span class="stat-name">Gió</span></div>
          <div class="stat"><span class="stat-icon">🌡️</span><span class="stat-val" id="statFeels">—</span><span class="stat-name">Cảm giác</span></div>
          <div class="stat"><span class="stat-icon">👁️</span><span class="stat-val" id="statVis">—</span><span class="stat-name">Tầm nhìn</span></div>
        </div>
      </div>

      <div id="forecastRow" class="forecast-row" style="display:none"></div>

      <!-- Leaflet Map Container -->
      <div id="map" class="map-container" style="display:none;"></div>

      <div class="history-section" id="historySection" style="display:none">
        <div class="history-header">
          <span>Tìm kiếm gần đây</span>
          <button class="clear-btn" id="clearHistory">Xóa</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </div>
    </section>

    <section class="hourly-forecast-section">
      <h3 class="section-title">Dự báo 24 giờ tới</h3>
      <div class="hourly-container" id="hourlyList">
      </div>
    </section>

    <!-- Các Tab khác giữ nguyên -->
    <section class="tab-panel" id="tab-compare">
      <div class="compare-inputs">
        <div class="compare-field"><label>Thành phố A</label><input type="text" id="cityA" /></div>
        <div class="vs-badge">VS</div>
        <div class="compare-field"><label>Thành phố B</label><input type="text" id="cityB" /></div>
      </div>
      <button class="btn-compare" id="compareBtn">So sánh ngay</button>
      <div class="quick-cities-container" id="container-compare"><div class="quick-cities" data-type="compare"></div></div>
      <div id="compareResult" class="compare-result" style="display:none"></div>
    </section>

    <section class="tab-panel" id="tab-chart">
      <div class="chart-search-wrap">
        <input type="text" id="chartCity" placeholder="Nhập thành phố..." />
        <button class="btn-primary" id="chartBtn">Vẽ biểu đồ</button>
      </div>
      <div class="quick-cities-container" id="container-chart"><div class="quick-cities" data-type="chart"></div></div>
      <div id="chartContainer" style="display:none">
        <div class="chart-title" id="chartTitle"></div>
        <canvas id="tempChart" height="260"></canvas>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
